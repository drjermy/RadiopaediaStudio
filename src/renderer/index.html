<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PACS Anonymizer</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #0a84ff;
      --muted: #888;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    /* Drop zone */
    #drop {
      flex: 1;
      border: 2px dashed var(--muted);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #666;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop.hover {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.08);
    }

    /* Panels — one shown at a time after inspect */
    .panel {
      flex: 1;
      border: 1px solid rgba(127, 127, 127, 0.3);
      border-radius: 12px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .panel.active { display: flex; }
    .panel h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    .panel .summary {
      font-size: 13px;
      color: #666;
    }
    .panel .path {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #444;
      word-break: break-all;
      background: rgba(127, 127, 127, 0.08);
      padding: 8px 10px;
      border-radius: 6px;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      font: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    #progress-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    progress {
      flex: 1;
      height: 8px;
    }
    #progress-label {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: #666;
      min-width: 120px;
      text-align: right;
    }

    /* Log */
    #log {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      background: rgba(127, 127, 127, 0.1);
      padding: 12px;
      border-radius: 8px;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
    }
    #log:empty { display: none; }

    /* Outputs list + add-version section */
    #outputs-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #outputs-list li {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      background: rgba(127, 127, 127, 0.08);
      border-radius: 6px;
      font-size: 12px;
    }
    #outputs-list li .out-label {
      font-weight: 500;
    }
    #outputs-list li .out-path {
      flex: 1;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .add-version h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
      color: #666;
    }
    .add-version {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .op-group {
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 6px;
      padding: 8px 12px;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
    }
    .op-group legend {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 4px;
    }
    .op-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
    .op-group input[type="number"] {
      width: 60px;
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .op-group select {
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .add-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }
    .suffix-preview {
      flex: 1;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #888;
    }
    .suffix-preview.empty {
      font-style: italic;
    }

    /* Layout helper: drop + panels in same visual slot */
    #main-area { flex: 1; display: flex; flex-direction: column; }
    #main-area > * { flex: 1; }
  </style>
</head>
<body>
  <h1>PACS Anonymizer</h1>

  <div id="main-area">
    <div id="drop">Drop a .dcm file or folder here</div>

    <div id="panel-inspected" class="panel">
      <h2 id="inspected-title">Ready to anonymise</h2>
      <p class="summary" id="inspected-summary"></p>
      <div class="path" id="inspected-path"></div>
      <div class="actions">
        <button class="primary" id="btn-anonymise">Anonymise</button>
        <button id="btn-cancel-inspect">Cancel</button>
      </div>
    </div>

    <div id="panel-processing" class="panel">
      <h2>Anonymising…</h2>
      <p class="summary" id="processing-summary"></p>
      <div id="progress-wrap">
        <progress id="progress-bar" value="0" max="1"></progress>
        <span id="progress-label">0 / 0</span>
      </div>
    </div>

    <div id="panel-done" class="panel">
      <h2 id="done-title">Done</h2>
      <p class="summary" id="done-summary"></p>
      <ul id="outputs-list"></ul>

      <div class="add-version">
        <h3>Create additional version</h3>

        <fieldset class="op-group">
          <legend>Reformat</legend>
          <label>Orientation:
            <select id="reformat-orientation">
              <option value="">none</option>
              <option value="axial">axial</option>
              <option value="coronal">coronal</option>
              <option value="sagittal">sagittal</option>
            </select>
          </label>
          <label>Thickness: <input type="number" id="reformat-thickness" value="3" min="0.5" step="0.5" /> mm</label>
          <label>Spacing: <input type="number" id="reformat-spacing" value="3" min="0.5" step="0.5" /> mm</label>
          <label>Projection:
            <select id="reformat-mode">
              <option value="avg">average</option>
              <option value="mip">MIP</option>
              <option value="minip">MinIP</option>
            </select>
          </label>
        </fieldset>

        <fieldset class="op-group">
          <legend>Window</legend>
          <label>Preset:
            <select id="window-preset">
              <option value="">none</option>
            </select>
          </label>
        </fieldset>

        <div class="add-controls">
          <span id="version-suffix-preview" class="suffix-preview"></span>
          <button class="primary" id="btn-create-version" disabled>Create</button>
        </div>
      </div>

      <div class="actions">
        <button id="btn-reset">Drop another</button>
      </div>
    </div>
  </div>

  <div id="log"></div>

  <script src="./renderer.js"></script>
</body>
</html>
