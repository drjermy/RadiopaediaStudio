<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PACS Anonymizer</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    #drop {
      flex: 1;
      border: 2px dashed #888;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #666;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop.hover {
      border-color: #0a84ff;
      background: rgba(10, 132, 255, 0.08);
    }
    #log {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      background: rgba(127, 127, 127, 0.1);
      padding: 12px;
      border-radius: 8px;
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>PACS Anonymizer</h1>
  <div id="drop">Drop a .dcm file here</div>
  <div id="log"></div>
  <script src="./renderer.js"></script>
</body>
</html>
