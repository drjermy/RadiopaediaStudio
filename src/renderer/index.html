<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Radiopaedia Studio</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #0a84ff;
      --muted: #888;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    /* Make the HTML `hidden` attribute win against any display:flex/grid
       rules we set elsewhere. */
    [hidden] { display: none !important; }
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    /* Single drop zone (Anonymise on drop). Open Folder button in the
       header handles the read-only Load flow. */
    #drop {
      flex: 1;
      border: 2px dashed var(--muted);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #666;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop.hover {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.08);
    }
    .app-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .app-header .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    /* Panels — one shown at a time after inspect */
    .panel {
      flex: 1;
      border: 1px solid rgba(127, 127, 127, 0.3);
      border-radius: 12px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .panel.active { display: flex; }
    .panel h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    .panel .summary {
      font-size: 13px;
      color: #666;
    }
    .panel .path {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #444;
      word-break: break-all;
      background: rgba(127, 127, 127, 0.08);
      padding: 8px 10px;
      border-radius: 6px;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      font: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    #progress-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    progress {
      flex: 1;
      height: 8px;
    }
    #progress-label {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: #666;
      min-width: 120px;
      text-align: right;
    }

    /* Log */
    #log {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      background: rgba(127, 127, 127, 0.1);
      padding: 12px;
      border-radius: 8px;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
    }
    #log:empty { display: none; }

    /* Study summary */
    .study-summary {
      padding: 4px 0;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .study-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .study-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      width: 100%;
      font: inherit;
      font-weight: 600;
      color: #333;
      background: transparent;
      border: none;
      padding: 4px 0;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid rgba(127, 127, 127, 0.2);
    }
    .study-header:hover { color: var(--accent); }
    .study-header .twisty {
      display: inline-block;
      width: 10px;
      font-size: 10px;
      color: #999;
      transition: transform 0.12s;
    }
    .study-block.collapsed .twisty { transform: rotate(-90deg); }
    .study-header .study-meta {
      font-weight: 400;
      color: #777;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      margin-left: auto;  /* right-align on same row */
    }
    .study-body {
      overflow: hidden;
    }
    .study-block.collapsed .study-body { display: none; }
    .study-summary .series-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .study-summary .series-list li {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      width: 192px;
      padding: 6px;
      color: #555;
      font-size: 12px;
      position: relative;
      border-radius: 8px;
      border: 2px solid transparent;
      transition: border-color 0.12s, background 0.12s;
    }
    .study-summary .series-list li.viewable { cursor: pointer; }
    .study-summary .series-list li.viewable:hover {
      background: rgba(127, 127, 127, 0.08);
    }
    /* Active thumbnail — the series currently open in the viewer. */
    .study-summary .series-list li.active {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.08);
    }
    .study-summary .series-list .thumb,
    .study-summary .series-list .thumb-placeholder {
      width: 192px;
      height: 192px;
      border-radius: 6px;
      background: #000;
      object-fit: contain;
      box-sizing: border-box;
    }
    .study-summary .series-list .thumb-placeholder {
      background: rgba(127, 127, 127, 0.2);
    }
    /* Compression indicator: top-left of thumb */
    .study-summary .series-list li .compression-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      pointer-events: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .study-summary .series-list li .compression-tag.lossy {
      color: rgba(255, 230, 160, 0.95);
      background: rgba(140, 80, 0, 0.55);
    }
    /* Delete button: top-right of thumb, appears on hover */
    .study-summary .series-list li .series-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .study-summary .series-list li:hover .series-delete {
      opacity: 1;
    }
    .study-summary .series-list li .series-delete:hover {
      background: rgba(180, 40, 40, 0.85);
    }
    /* Trim button: bottom-right of thumb, appears on hover */
    .study-summary .series-list li .series-trim-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.95);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .study-summary .series-list li:hover .series-trim-btn {
      opacity: 1;
    }
    .study-summary .series-list li .series-trim-btn:hover {
      background: rgba(10, 132, 255, 0.85);
    }
    /* Trim-only viewer mode: hide everything except image + slider + Trim */
    #viewer-section.trim-only .viewer-actions > *:not(#btn-close-viewer),
    #viewer-section.trim-only #viewer-hint,
    #viewer-section.trim-only .viewer-data-row {
      display: none !important;
    }
    .study-summary .series-list .series-desc {
      font-weight: 500;
      color: #333;
      line-height: 1.25;
      word-break: break-word;
    }
    .study-summary .series-list .series-meta {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: #777;
    }

    /* Done header: title left, reveal right */
    .done-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    /* Viewer section (inline inside the Done panel, below the thumbnails) */
    #viewer-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .viewer-header h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    .viewer-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .viewer-actions select {
      font: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    button.icon-btn {
      width: 26px;
      height: 26px;
      padding: 0;
      line-height: 1;
      font-size: 18px;
      color: #888;
      border-radius: 4px;
    }
    button.icon-btn:hover {
      color: #333;
      background: rgba(127, 127, 127, 0.15);
    }
    .viewer-hint {
      font-size: 11px;
      color: #888;
    }
    #viewer-canvas {
      min-height: 500px;
      background: #000;
      border-radius: 6px;
      position: relative;
    }
    #viewer-canvas > * { width: 100%; height: 100%; }
    .viewer-status {
      display: flex;
      gap: 16px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #777;
      padding: 2px 4px;
    }
    .viewer-status .k { color: #999; margin-right: 4px; }
    .viewer-status .v { color: #333; font-weight: 500; }
    /* Data row beneath the viewer: status (W/L, View, Thickness) on the
       left, window preset selector on the right. */
    .viewer-data-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 2px 4px;
    }
    .viewer-data-row .viewer-status { flex: 1; padding: 0; }
    .viewer-data-row select {
      font-size: 12px;
      padding: 2px 6px;
    }
    .inline-label {
      font-size: 12px;
      color: #555;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .inline-label input[type="number"] { width: 52px; }

    /* Dual-handle trim slider — two range inputs layered on one track.
       Hands-down simplest trick: position the thumbs with pointer-events,
       let the background fill between them. */
    .viewer-trim {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }
    .trim-track {
      position: relative;
      height: 24px;
      background: rgba(127, 127, 127, 0.15);
      border-radius: 6px;
    }
    .trim-track input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 24px;
      background: transparent;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    .trim-track input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      pointer-events: auto;
      width: 14px;
      height: 24px;
      border-radius: 3px;
      background: var(--accent);
      cursor: ew-resize;
      border: none;
    }
    .trim-track input[type="range"]::-webkit-slider-runnable-track {
      height: 24px;
      background: transparent;
    }
    .trim-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(10, 132, 255, 0.2);
      border-radius: 6px;
      pointer-events: none;
    }
    .trim-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .trim-label {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: #777;
      padding: 0 4px;
    }
    .trim-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      color: #222;
      cursor: pointer;
    }
    .trim-btn:disabled {
      background: #eee;
      color: #999;
      cursor: default;
    }
    .drop-details {
      font-size: 12px;
    }
    .drop-details > summary {
      cursor: pointer;
      color: #888;
      padding: 4px 0;
      user-select: none;
    }
    .drop-details > summary:hover { color: var(--accent); }
    .drop-details[open] > summary { color: #555; }
    #drop-details-body {
      padding: 8px 0 4px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #666;
    }
    #drop-details-body .drop-row {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    #drop-details-body .drop-row .count {
      color: #999;
    }
    #drop-details-body .empty {
      font-style: italic;
      color: #999;
    }
    .op-group {
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 6px;
      padding: 8px 12px;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
    }
    .op-group legend {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 4px;
    }
    .op-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
    .op-group input[type="number"] {
      width: 60px;
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .op-group select {
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .op-group .hint {
      flex: 1 0 100%;
      font-size: 11px;
      color: #888;
    }
    .op-group .hint code {
      background: rgba(127, 127, 127, 0.15);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* Layout helper: drop + panels in same visual slot */
    #main-area { flex: 1; display: flex; flex-direction: column; }
    #main-area > * { flex: 1; }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>Radiopaedia Studio</h1>
    <div class="header-actions">
      <button id="btn-open-folder">Open Folder</button>
      <button id="btn-reset" hidden>Clear</button>
    </div>
  </div>

  <div id="main-area">
    <div id="drop">Drop a .dcm file or folder here to anonymise</div>

    <div id="panel-inspected" class="panel">
      <h2 id="inspected-title">Ready to anonymise</h2>
      <p class="summary" id="inspected-summary"></p>
      <div class="path" id="inspected-path"></div>
      <div class="actions">
        <button class="primary" id="btn-anonymise">Anonymise &amp; Analyse</button>
        <button id="btn-cancel-inspect">Cancel</button>
      </div>
    </div>

    <div id="panel-processing" class="panel">
      <h2>Anonymising…</h2>
      <p class="summary" id="processing-summary"></p>
      <div id="progress-wrap">
        <progress id="progress-bar" value="0" max="1"></progress>
        <span id="progress-label">0 / 0</span>
      </div>
    </div>

    <div id="panel-done" class="panel">
      <div class="done-header">
        <h2 id="done-title">Done</h2>
        <button class="primary" id="btn-reveal-main">Reveal in Finder</button>
      </div>
      <details id="drop-details" class="drop-details" hidden>
        <summary>Anonymisation details</summary>
        <div id="drop-details-body"></div>
      </details>
      <div id="study-summary" class="study-summary" hidden></div>

      <div id="viewer-section" hidden>
        <div class="viewer-header">
          <h2 id="viewer-title">Viewer</h2>
          <div class="viewer-actions">
            <label class="inline-label">Compress:
              <select id="viewer-compress-mode">
                <option value="">none</option>
                <option value="lossless">JPEG 2000 lossless</option>
                <option value="lossy">JPEG 2000 lossy</option>
              </select>
            </label>
            <label id="viewer-compress-ratio-label" class="inline-label" hidden>
              <input type="number" id="viewer-compress-ratio" value="12" min="2" step="1" />:1
            </label>
            <button class="primary" id="btn-save-viewer" title="Save current view as a derived series">Save</button>
            <button id="btn-close-viewer" class="icon-btn" aria-label="Close">×</button>
          </div>
        </div>
        <div id="viewer-canvas"></div>
        <div id="viewer-hint" class="viewer-hint"></div>
        <div id="viewer-trim" class="viewer-trim" hidden>
          <div class="trim-track">
            <div class="trim-fill" id="trim-fill"></div>
            <input type="range" id="trim-start" min="0" max="1" value="0" />
            <input type="range" id="trim-end" min="0" max="1" value="1" />
          </div>
          <div class="trim-row">
            <div class="trim-label" id="trim-label"></div>
            <button id="btn-trim" class="trim-btn" disabled>Trim</button>
          </div>
        </div>
        <div class="viewer-data-row">
          <div id="viewer-status" class="viewer-status"></div>
          <select id="viewer-preset" title="Apply a window preset">
            <option value="">Preset…</option>
            <option value="__reset">Reset (space)</option>
          </select>
        </div>
      </div>


    </div>
  </div>

  <div id="log"></div>

  <script type="module" src="./renderer.js"></script>
  <script type="module" src="./viewer.bundle.js"></script>
</body>
</html>
