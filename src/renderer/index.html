<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PACS Anonymizer</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #0a84ff;
      --muted: #888;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    /* Make the HTML `hidden` attribute win against any display:flex/grid
       rules we set elsewhere. */
    [hidden] { display: none !important; }
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    /* Drop zone */
    #drop {
      flex: 1;
      border: 2px dashed var(--muted);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #666;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop.hover {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.08);
    }

    /* Panels — one shown at a time after inspect */
    .panel {
      flex: 1;
      border: 1px solid rgba(127, 127, 127, 0.3);
      border-radius: 12px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .panel.active { display: flex; }
    .panel h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    .panel .summary {
      font-size: 13px;
      color: #666;
    }
    .panel .path {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #444;
      word-break: break-all;
      background: rgba(127, 127, 127, 0.08);
      padding: 8px 10px;
      border-radius: 6px;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      font: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    #progress-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    progress {
      flex: 1;
      height: 8px;
    }
    #progress-label {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: #666;
      min-width: 120px;
      text-align: right;
    }

    /* Log */
    #log {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      background: rgba(127, 127, 127, 0.1);
      padding: 12px;
      border-radius: 8px;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
    }
    #log:empty { display: none; }

    /* Study summary */
    .study-summary {
      padding: 4px 0;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .study-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .study-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      width: 100%;
      font: inherit;
      font-weight: 600;
      color: #333;
      background: transparent;
      border: none;
      padding: 4px 0;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid rgba(127, 127, 127, 0.2);
    }
    .study-header:hover { color: var(--accent); }
    .study-header .twisty {
      display: inline-block;
      width: 10px;
      font-size: 10px;
      color: #999;
      transition: transform 0.12s;
    }
    .study-block.collapsed .twisty { transform: rotate(-90deg); }
    .study-header .study-meta {
      font-weight: 400;
      color: #777;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      margin-left: auto;  /* right-align on same row */
    }
    .study-body {
      overflow: hidden;
    }
    .study-block.collapsed .study-body { display: none; }
    .study-summary .series-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .study-summary .series-list li {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      width: 192px;
      padding: 6px;
      color: #555;
      font-size: 12px;
      position: relative;
    }
    .study-summary .series-list .thumb,
    .study-summary .series-list .thumb-placeholder {
      width: 192px;
      height: 192px;
      border-radius: 6px;
      background: #000;
      object-fit: contain;
      box-sizing: border-box;
    }
    .study-summary .series-list .thumb-placeholder {
      background: rgba(127, 127, 127, 0.2);
    }
    /* Derived (reformat / window) series: small top-left tag on thumb */
    .study-summary .series-list li.derived .derived-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      pointer-events: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .study-summary .series-list .add-card {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 192px;
      height: 192px;
      border-radius: 6px;
      border: 2px dashed rgba(127, 127, 127, 0.4);
      font-size: 56px;
      color: #aaa;
      font-weight: 300;
      transition: border-color 0.12s, color 0.12s;
    }
    .study-summary .series-list .add-card-wrap {
      width: 192px;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .study-summary .series-list .add-card-wrap:hover,
    .study-summary .series-list .add-card-wrap.selected {
      background: rgba(10, 132, 255, 0.08);
    }
    .study-summary .series-list .add-card-wrap:hover .add-card,
    .study-summary .series-list .add-card-wrap.selected .add-card {
      border-color: var(--accent);
      color: var(--accent);
      border-style: solid;
    }
    .study-summary .series-list .add-card-label {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .study-summary .series-list .series-desc {
      font-weight: 500;
      color: #333;
      line-height: 1.25;
      word-break: break-word;
    }
    .study-summary .series-list .series-meta {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: #777;
    }

    /* Done header: title left, reveal right */
    .done-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .drop-details {
      font-size: 12px;
    }
    .drop-details > summary {
      cursor: pointer;
      color: #888;
      padding: 4px 0;
      user-select: none;
    }
    .drop-details > summary:hover { color: var(--accent); }
    .drop-details[open] > summary { color: #555; }
    #drop-details-body {
      padding: 8px 0 4px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #666;
    }
    #drop-details-body .drop-row {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    #drop-details-body .drop-row .count {
      color: #999;
    }
    #drop-details-body .empty {
      font-style: italic;
      color: #999;
    }
    .add-version h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
      color: #666;
    }
    .add-version {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .add-version[hidden] { display: none; }
    .op-group {
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 6px;
      padding: 8px 12px;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
    }
    .op-group legend {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 4px;
    }
    .op-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
    .op-group input[type="number"] {
      width: 60px;
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .op-group select {
      font: inherit;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    .add-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }
    .suffix-preview {
      flex: 1;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: #888;
    }
    .suffix-preview.empty {
      font-style: italic;
    }
    .op-group .hint {
      flex: 1 0 100%;
      font-size: 11px;
      color: #888;
    }
    .op-group .hint code {
      background: rgba(127, 127, 127, 0.15);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* Layout helper: drop + panels in same visual slot */
    #main-area { flex: 1; display: flex; flex-direction: column; }
    #main-area > * { flex: 1; }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>PACS Anonymizer</h1>
    <button id="btn-reset" hidden>Clear</button>
  </div>

  <div id="main-area">
    <div id="drop">Drop a .dcm file or folder here</div>

    <div id="panel-inspected" class="panel">
      <h2 id="inspected-title">Ready to anonymise</h2>
      <p class="summary" id="inspected-summary"></p>
      <div class="path" id="inspected-path"></div>
      <div class="actions">
        <button class="primary" id="btn-anonymise">Anonymise &amp; Analyse</button>
        <button id="btn-cancel-inspect">Cancel</button>
      </div>
    </div>

    <div id="panel-processing" class="panel">
      <h2>Anonymising…</h2>
      <p class="summary" id="processing-summary"></p>
      <div id="progress-wrap">
        <progress id="progress-bar" value="0" max="1"></progress>
        <span id="progress-label">0 / 0</span>
      </div>
    </div>

    <div id="panel-done" class="panel">
      <div class="done-header">
        <h2 id="done-title">Done</h2>
        <button class="primary" id="btn-reveal-main">Reveal in Finder</button>
      </div>
      <details id="drop-details" class="drop-details" hidden>
        <summary>Anonymisation details</summary>
        <div id="drop-details-body"></div>
      </details>
      <div id="study-summary" class="study-summary" hidden></div>

      <div class="add-version" id="add-version" hidden>
        <h3 id="add-version-title">Create additional version</h3>

        <fieldset class="op-group">
          <legend>Base series</legend>
          <label>Source:
            <select id="base-series"></select>
          </label>
        </fieldset>

        <fieldset class="op-group">
          <legend>MPR (slab reformat)</legend>
          <label>Orientation:
            <select id="reformat-orientation">
              <option value="">none</option>
              <option value="axial">axial</option>
              <option value="coronal">coronal</option>
              <option value="sagittal">sagittal</option>
            </select>
          </label>
          <label>Thickness:
            <input type="text" id="reformat-thickness" value="3" />
          </label>
          <label>Projection:
            <select id="reformat-mode">
              <option value="avg">average</option>
              <option value="mip">MIP</option>
              <option value="minip">MinIP</option>
            </select>
          </label>
          <small class="hint">
            <code>3</code> = contiguous 3 mm slabs.
            <code>1/10</code> = 1 mm thin-slab MPR every 10 mm.
          </small>
        </fieldset>

        <fieldset class="op-group">
          <legend>Window</legend>
          <label>Preset:
            <select id="window-preset">
              <option value="">none</option>
            </select>
          </label>
        </fieldset>

        <div class="add-controls">
          <span id="version-suffix-preview" class="suffix-preview"></span>
          <button class="primary" id="btn-create-version" disabled>Create</button>
        </div>
      </div>

    </div>
  </div>

  <div id="log"></div>

  <script src="./renderer.js"></script>
</body>
</html>
