appId: com.radiopaedia.pacs-anonymizer
productName: PACS Anonymizer
directories:
  output: build
  buildResources: build-resources
files:
  - dist/**/*
  - src/renderer/**/*
  - package.json
extraResources:
  - from: backend/dist/pacs-anonymizer-backend
    to: backend-bin
    filter:
      - "**/*"
  - from: backend-js
    to: backend-js
    filter:
      - "server.mjs"
      - "package.json"
      - "node_modules/**/*"
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.medical
  identity: null
